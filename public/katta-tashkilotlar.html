<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katta Tashkilotlar Report</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 54px;
    }
    header .brand { font-size: 1rem; font-weight: 700; white-space: nowrap; }
    nav a {
      color: rgba(255,255,255,.6);
      text-decoration: none;
      font-size: 0.88rem;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background .15s;
    }
    nav a:hover, nav a.active { background: rgba(255,255,255,.12); color: #fff; }

    .search-bar {
      padding: 32px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-bar input {
      width: 100%;
      max-width: 420px;
      padding: 9px 14px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 0.92rem;
      outline: none;
      background: #fff;
    }
    .search-bar input:focus { border-color: #4f6ef7; }

    .table-wrap {
      padding: 0 32px 32px;
    }
    .table-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: auto;
      max-height: calc(100vh - 200px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #f8f9ff;
      color: #444;
      font-weight: 600;
      text-align: left;
      padding: 11px 12px;
      border-bottom: 2px solid #e8ecff;
      white-space: nowrap;
      z-index: 1;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f1f5;
      vertical-align: top;
    }
    tbody tr:hover { background: #fafbff; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.muted { color: #999; }
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div class="brand">AgriLandTin</div>
  <nav>
    <a href="/">Bosh sahifa</a>
    <a href="/land-category.html">Land Category</a>
    <a href="/cross-matrix.html">Cross Matrix</a>
    <a href="/six-shapes.html">6-shakl</a>
    <a href="/hokimyat-mat.html">Hokimyat Mat</a>
    <a href="/katta-tashkilotlar.html" class="active">Katta Tashkilotlar</a>
    <a href="/tin-soato-pairs.html">TIN-SOATO</a>
  </nav>
</header>

<div class="search-bar">
  <input id="q" type="text" placeholder="Qidirish: TIN..." />
  <button id="export-btn" style="padding:9px 18px; background:#2a9d3f; color:#fff; border:none; border-radius:7px; cursor:pointer; font-size:0.92rem; white-space:nowrap;">Excel yuklab olish</button>
</div>

<div class="table-wrap">
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th style="background:#F9DC5C">TIN</th>
          <th>defined_arable_area_size_list_sum</th>
          <th>defined_area_size_list_sum</th>
          <th>gis_area_ha_list2_sum</th>
          <th>gis_area_ha_list_sum</th>
          <th style="background:#9AD872">six_total_land_area_sum</th>
        </tr>
      </thead>
      <tbody id="tb">
        <tr><td colspan="7" class="loading">Yuklanmoqda...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API = '/api/agri-land-tins';
let ALL = [];

const fmt = n => Number(n || 0).toLocaleString('uz-UZ', { maximumFractionDigits: 2 });

function render(items) {
  const tb = document.getElementById('tb');
  if (!items.length) {
    tb.innerHTML = '<tr><td colspan="7" class="loading">Ma\'lumot topilmadi</td></tr>';
    return;
  }
  const rows = items.map((it, i) => `
    <tr>
      <td>${i + 1}</td>
      <td style="background:#F9DC5C">${it.tin || '<span class="muted">—</span>'}</td>
      <td class="num">${fmt(it.defined_arable_area_size_list_sum)}</td>
      <td class="num">${fmt(it.defined_area_size_list_sum)}</td>
      <td class="num">${fmt(it.gis_area_ha_list2_sum)}</td>
      <td class="num">${fmt(it.gis_area_ha_list_sum)}</td>
      <td class="num" style="background:#9AD872">${fmt(it.six_total_land_area_sum)}</td>
    </tr>
  `).join('');

  const s1 = items.reduce((s, x) => s + (x.defined_arable_area_size_list_sum || 0), 0);
  const s2 = items.reduce((s, x) => s + (x.defined_area_size_list_sum || 0), 0);
  const s3 = items.reduce((s, x) => s + (x.gis_area_ha_list2_sum || 0), 0);
  const s4 = items.reduce((s, x) => s + (x.gis_area_ha_list_sum || 0), 0);
  const s5 = items.reduce((s, x) => s + (x.six_total_land_area_sum || 0), 0);

  const totalRow = `
    <tr style="font-weight:700; background:#eef1ff;">
      <td colspan="2">Jami</td>
      <td class="num">${fmt(s1)}</td>
      <td class="num">${fmt(s2)}</td>
      <td class="num">${fmt(s3)}</td>
      <td class="num">${fmt(s4)}</td>
      <td class="num" style="background:#9AD872">${fmt(s5)}</td>
    </tr>
  `;

  tb.innerHTML = rows + totalRow;
}

function filterItems() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  if (!q) return ALL;
  return ALL.filter(it => (it.tin || '').toLowerCase().includes(q));
}

document.getElementById('q').addEventListener('input', () => render(filterItems()));

document.getElementById('export-btn').addEventListener('click', () => {
  const items = filterItems();
  const header = ['#','TIN','defined_arable_area_size_list_sum','defined_area_size_list_sum','gis_area_ha_list2_sum','gis_area_ha_list_sum','six_total_land_area_sum'];
  const rows = items.map((it, i) => [
    i + 1,
    it.tin || '',
    +(it.defined_arable_area_size_list_sum || 0),
    +(it.defined_area_size_list_sum || 0),
    +(it.gis_area_ha_list2_sum || 0),
    +(it.gis_area_ha_list_sum || 0),
    +(it.six_total_land_area_sum || 0),
  ]);

  const s1 = items.reduce((s, x) => s + (x.defined_arable_area_size_list_sum || 0), 0);
  const s2 = items.reduce((s, x) => s + (x.defined_area_size_list_sum || 0), 0);
  const s3 = items.reduce((s, x) => s + (x.gis_area_ha_list2_sum || 0), 0);
  const s4 = items.reduce((s, x) => s + (x.gis_area_ha_list_sum || 0), 0);
  const s5 = items.reduce((s, x) => s + (x.six_total_land_area_sum || 0), 0);

  const totalRow = ['Jami','', s1, s2, s3, s4, s5];

  const ws = XLSX.utils.aoa_to_sheet([header, ...rows, totalRow]);
  ws['!cols'] = [{wch:5},{wch:14},{wch:32},{wch:28},{wch:22},{wch:22},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Katta Tashkilotlar');
  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `katta-tashkilotlar-${ts}.xlsx`);
});

(async () => {
  const r = await fetch(`${API}/katta-tashkilotlar`);
  const data = await r.json();
  ALL = data.items || [];
  render(ALL);
})();
</script>
</body>
</html>
