<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qo'ng'irot tumani — to'liq tahlil</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f2f5; color:#1a1a2e; }

    header { background:#1a1a2e; color:#fff; padding:0 32px; display:flex; align-items:center; gap:32px; height:54px; }
    header .brand { font-size:1rem; font-weight:700; white-space:nowrap; }
    nav a { color:rgba(255,255,255,.6); text-decoration:none; font-size:0.88rem; padding:6px 12px; border-radius:6px; }
    nav a:hover, nav a.active { background:rgba(255,255,255,.12); color:#fff; }

    .page-title { padding:24px 32px 8px; }
    .page-title h1 { font-size:1.4rem; }
    .page-title .sub { color:#666; font-size:0.92rem; margin-top:4px; }

    .stats-bar { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:14px; padding:16px 32px; }
    .stat-card { background:#fff; border-radius:10px; padding:14px 18px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .stat-card .label { font-size:0.7rem; color:#888; text-transform:uppercase; letter-spacing:.05em; }
    .stat-card .value { font-size:1.4rem; font-weight:700; margin-top:4px; }
    .stat-card.accent { background:#1a1a2e; color:#fff; }
    .stat-card.accent .label { color:#aaa; }
    .stat-card.green { background:#9AD872; }
    .stat-card.yellow { background:#F9DC5C; }

    .section { padding:14px 32px; }
    .section h2 { font-size:1rem; color:#444; margin-bottom:10px; padding-left:4px; border-left:3px solid #4f6ef7; padding-left:10px; }

    .grid { display:grid; gap:16px; }
    .grid-2 { grid-template-columns:1fr 1fr; }
    .grid-3 { grid-template-columns:repeat(3, 1fr); }
    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns:1fr; } }

    .card { background:#fff; border-radius:10px; padding:18px 20px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .card h3 { font-size:0.92rem; font-weight:600; color:#444; margin-bottom:14px; }

    table { width:100%; border-collapse:collapse; font-size:0.83rem; }
    th { text-align:left; font-weight:600; color:#666; padding:8px 10px; border-bottom:2px solid #eef0f5; background:#fafbff; position:sticky; top:0; }
    td { padding:7px 10px; border-bottom:1px solid #f5f6fa; }
    td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .scroll-300 { max-height:300px; overflow:auto; }
    .scroll-400 { max-height:400px; overflow:auto; }

    .chart-wrap { position:relative; height:260px; }
    .loading { text-align:center; padding:40px; color:#aaa; }

    .pill { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.75rem; font-weight:600; }
    .pill-green { background:#e6f7e0; color:#2a9d3f; }
    .pill-red { background:#fdecec; color:#e55; }
    .pill-blue { background:#eef1ff; color:#4f6ef7; }
    .pill-yellow { background:#fff7d6; color:#a07700; }
  </style>
</head>
<body>

<header>
  <div class="brand">AgriLandTin</div>
  <nav>
    <a href="/">Bosh sahifa</a>
    <a href="/land-category.html">Land Category</a>
    <a href="/cross-matrix.html">Cross Matrix</a>
    <a href="/six-shapes.html">6-shakl</a>
    <a href="/hokimyat-mat.html">Hokimyat Mat</a>
    <a href="/katta-tashkilotlar.html">Katta Tashkilotlar</a>
    <a href="/tin-soato-pairs.html">TIN-SOATO</a>
    <a href="/qungirot.html" class="active">Qo'ng'irot</a>
  </nav>
</header>

<div class="page-title">
  <h1>Qo'ng'irot tumani — to'liq analitika</h1>
  <div class="sub">SOATO: 1735215 · Qoraqalpog'iston Respublikasi</div>
</div>

<div id="root"><div class="loading">Yuklanmoqda...</div></div>

<script>
const API = '/api/agri-land-tins/qungirot-analysis';

const fmt   = n => Number(n || 0).toLocaleString('uz-UZ', { maximumFractionDigits: 2 });
const fmtI  = n => Number(n || 0).toLocaleString('uz-UZ');
const safe  = v => v == null || v === '' ? '<span style="color:#aaa">—</span>' : String(v);

const COLORS = ['#4f6ef7','#f7914f','#4fc9f7','#f74f6e','#6ef74f','#f7e14f','#a04ff7','#4ff7a0','#f74fa0','#ffb84f','#8f8f8f','#5fc6c6'];

function tableRows(items, cols) {
  if (!items || !items.length) return '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#aaa;padding:14px">Bo\'sh</td></tr>';
  return items.map((it, i) => '<tr>' + cols.map(c => {
    const v = c.fn ? c.fn(it, i) : it[c.key];
    return `<td${c.num ? ' class="num"' : ''}>${v == null ? '<span style="color:#aaa">—</span>' : v}</td>`;
  }).join('') + '</tr>').join('');
}

function table(headers, items, cols, scroll = 'scroll-300') {
  return `<div class="${scroll}"><table>
    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${tableRows(items, cols)}</tbody>
  </table></div>`;
}

function makeChart(canvasId, labels, values, type = 'doughnut') {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  new Chart(ctx, {
    type,
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: COLORS,
        borderRadius: type === 'bar' ? 4 : 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: type === 'bar' ? { display: false } : { position: 'right', labels: { font: { size: 10 }, boxWidth: 12 } },
      },
      scales: type === 'bar' ? { y: { beginAtZero: true } } : {},
    },
  });
}

const FIELD_CAT = { 1: 'Bir yillik ekinlar', 2: "Ko'p yillik ekinlar", 3: 'Issiqxona ekinlari' };
const GROUND_SRC = {
  1: 'Yaylov ijara', 2: "O'rmon/suv ijara", 3: 'Hokimlik zaxiradan ijara',
  4: '2-lamchi ijara', 5: 'Daryo/yo\'l/liniya zonalari', 6: 'Ijtimoiy soha',
  7: 'Zaxvat (rasmiylashtirilmagan)', 8: 'Yangi o\'zlashtirilgan', 9: 'Boshqa'
};

(async () => {
  try {
  const r = await fetch(API);
  const d = await r.json();

  const root = document.getElementById('root');

  const a = d.agri_land_full.overall;
  const s = d.six_shapes.overall;
  const f = d.defined_arable_lands.overall;
  const tsp = d.tin_soato_pairs.overall;
  const fs = d.agri_land_full.five_shape_stats;

  let html = '';

  // ============ SECTION 1: Stats bar ============
  html += `<div class="stats-bar">
    <div class="stat-card accent"><div class="label">Kadastr yozuvlari</div><div class="value">${fmtI(a.count)}</div></div>
    <div class="stat-card"><div class="label">Unique kadastr</div><div class="value">${fmtI(a.cadastral_count)}</div></div>
    <div class="stat-card"><div class="label">Unique TIN</div><div class="value">${fmtI(a.tin_count)}</div></div>
    <div class="stat-card"><div class="label">Mahallalar</div><div class="value">${fmtI(a.mahalla_count)}</div></div>
    <div class="stat-card green"><div class="label">Jami GIS maydon (ga)</div><div class="value">${fmt(a.total_area)}</div></div>
    <div class="stat-card yellow"><div class="label">6-shakil yozuvlari</div><div class="value">${fmtI(s.count)}</div></div>
    <div class="stat-card yellow"><div class="label">6-shakil tashkilotlar</div><div class="value">${fmtI(s.org_count)}</div></div>
    <div class="stat-card yellow"><div class="label">6-shakil jami yer (ga)</div><div class="value">${fmt(s.total_land_area)}</div></div>
  </div>`;

  // ============ SECTION 2: Comparative summary ============
  html += `<div class="section">
    <h2>Manba bo'yicha umumiy taqqoslash</h2>
    <div class="card">
      <table>
        <thead><tr><th>Manba</th><th>Yozuvlar</th><th>Jami maydon (ga)</th><th>Boshqa</th></tr></thead>
        <tbody>
          <tr><td><b>Kadastr (agri_land_full)</b></td><td class="num">${fmtI(a.count)}</td><td class="num">${fmt(a.total_area)}</td>
              <td>${fmtI(a.tin_count)} TIN · ${fmtI(a.cadastral_count)} unique kadastr · ${fmtI(a.mahalla_count)} mahalla</td></tr>
          <tr><td><b>6-shakil (six_shapes)</b></td><td class="num">${fmtI(s.count)}</td><td class="num">${fmt(s.total_land_area)}</td>
              <td>${fmtI(s.org_count)} tashkilot · q.x.: ${fmt(s.agricultural_land_total)} · haydalma: ${fmt(s.arable_land)}</td></tr>
          <tr><td><b>Chizilgan (defined_arable)</b></td><td class="num">${fmtI(f.count)}</td><td class="num">${fmt(f.total_area)}</td>
              <td>${fmtI(f.tin_count)} TIN · ${fmtI(f.mahalla_count)} mahalla · ${fmtI(f.fell_count)} bir-biriga tushgan</td></tr>
          <tr><td><b>TIN-SOATO juftliklar</b></td><td class="num">${fmtI(tsp.count)}</td><td class="num">${fmt(tsp.gis_area_ha_total)}</td>
              <td>6-shakl: ${fmt(tsp.total_land_area)} · chizilgan: ${fmt(tsp.arable_area_size_total)}</td></tr>
          <tr><td><b>5-shakil (kadastrdan)</b></td><td class="num">${fmtI(fs.submitted)} topshirilgan</td><td class="num">${fmt(fs.total_land_area)}</td>
              <td>ekin maydoni: ${fmt(fs.crop_area)} · ekilgan: ${fmt(fs.planted_area)}</td></tr>
          <tr><td><b>Hokimyat mat</b></td><td class="num">${fmtI(d.counts.hokimyat_mat)}</td><td class="num">—</td><td>—</td></tr>
          <tr><td><b>Ijara</b></td><td class="num">${fmtI(d.counts.ijara)}</td><td class="num">—</td><td>—</td></tr>
          <tr><td><b>Reserve clean</b></td><td class="num">${fmtI(d.counts.reserve)}</td><td class="num">—</td><td>—</td></tr>
        </tbody>
      </table>
    </div>
  </div>`;

  // ============ SECTION 3: Charts (kadastr + 6-shakil) ============
  html += `<div class="section">
    <h2>Land Fund Category bo'yicha taqsimot</h2>
    <div class="grid grid-2">
      <div class="card"><h3>Kadastr (agri_land_full) — kategoriya</h3><div class="chart-wrap"><canvas id="ch-agl-cat"></canvas></div></div>
      <div class="card"><h3>6-shakil — kategoriya</h3><div class="chart-wrap"><canvas id="ch-six-cat"></canvas></div></div>
    </div>
  </div>`;

  // ============ SECTION 4: Land fund category tables ============
  html += `<div class="section">
    <h2>Land Fund Category — batafsil</h2>
    <div class="grid grid-2">
      <div class="card"><h3>Kadastr</h3>${
        table(['Code','Tavsif','Yozuv','Maydon (ga)'], d.agri_land_full.by_category, [
          { fn: it => safe(it._id?.code) },
          { fn: it => safe(it._id?.desc) },
          { key: 'count', num: true, fn: it => fmtI(it.count) },
          { key: 'area',  num: true, fn: it => fmt(it.area) },
        ])
      }</div>
      <div class="card"><h3>6-shakil</h3>${
        table(['Code','Tavsif','Yozuv','Maydon (ga)'], d.six_shapes.by_category, [
          { fn: it => safe(it._id?.code) },
          { fn: it => safe(it._id?.desc) },
          { key: 'count', num: true, fn: it => fmtI(it.count) },
          { key: 'area',  num: true, fn: it => fmt(it.area) },
        ])
      }</div>
    </div>
  </div>`;

  // ============ SECTION 5: Land fund type ============
  html += `<div class="section">
    <h2>Land Fund Type — eng yirik 30 ta</h2>
    <div class="grid grid-2">
      <div class="card"><h3>Kadastr — type bo'yicha</h3>${
        table(['Code','Tavsif','Yozuv','Maydon'], d.agri_land_full.by_type, [
          { fn: it => safe(it._id?.code) },
          { fn: it => `<div style="font-size:0.78rem">${safe(it._id?.desc)}</div>` },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ], 'scroll-400')
      }</div>
      <div class="card"><h3>6-shakil — type bo'yicha</h3>${
        table(['Code','Tavsif','Yozuv','Maydon'], d.six_shapes.by_type, [
          { fn: it => safe(it._id?.code) },
          { fn: it => `<div style="font-size:0.78rem">${safe(it._id?.desc)}</div>` },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ], 'scroll-400')
      }</div>
    </div>
  </div>`;

  // ============ SECTION 6: Property + Tenancy ============
  html += `<div class="section">
    <h2>Property Kind / Tenancy / Status</h2>
    <div class="grid grid-3">
      <div class="card"><h3>Kadastr — Property Kind</h3><div class="chart-wrap"><canvas id="ch-prop"></canvas></div></div>
      <div class="card"><h3>Kadastr — Tenancy</h3><div class="chart-wrap"><canvas id="ch-ten"></canvas></div></div>
      <div class="card"><h3>6-shakil — Status</h3><div class="chart-wrap"><canvas id="ch-six-stat"></canvas></div></div>
    </div>
  </div>`;

  // ============ SECTION 7: 6-shakil deep ============
  html += `<div class="section">
    <h2>6-shakil — chuqur ko'rsatkichlar</h2>
    <div class="stats-bar" style="padding:0">
      <div class="stat-card"><div class="label">Jami yer maydoni</div><div class="value">${fmt(s.total_land_area)}</div></div>
      <div class="stat-card"><div class="label">Q.x. maydoni</div><div class="value">${fmt(s.agricultural_land_total)}</div></div>
      <div class="stat-card"><div class="label">Haydalma yer</div><div class="value">${fmt(s.arable_land)}</div></div>
      <div class="stat-card"><div class="label">Ekin maydoni</div><div class="value">${fmt(s.sown_area)}</div></div>
      <div class="stat-card"><div class="label">Issiqxona</div><div class="value">${fmt(s.greenhouse_land_area)}</div></div>
      <div class="stat-card"><div class="label">Ikkilamchi ijara olingan</div><div class="value">${fmt(s.subleased_land_area)}</div></div>
      <div class="stat-card"><div class="label">Ijaraga berilgan</div><div class="value">${fmt(s.leased_out_land_area)}</div></div>
    </div>
  </div>`;

  // ============ SECTION 8: Defined arable analysis ============
  html += `<div class="section">
    <h2>Chizilgan yerlar (defined_arable_lands)</h2>
    <div class="grid grid-2">
      <div class="card"><h3>Field Category bo'yicha (1 yillik / ko'p yillik / issiqxona)</h3>${
        table(['Code','Tavsif','Yozuv','Maydon (ga)'], d.defined_arable_lands.by_field_category, [
          { fn: it => `<span class="pill pill-blue">${it._id}</span>` },
          { fn: it => FIELD_CAT[it._id] || '—' },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ])
      }</div>
      <div class="card"><h3>Ground Source bo'yicha (yer manbai)</h3>${
        table(['Code','Tavsif','Yozuv','Maydon (ga)'], d.defined_arable_lands.by_ground_source, [
          { fn: it => `<span class="pill pill-yellow">${it._id}</span>` },
          { fn: it => GROUND_SRC[it._id] || '—' },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ])
      }</div>
    </div>
  </div>`;

  // ============ SECTION 9: Top organizations + top tins ============
  html += `<div class="section">
    <h2>Eng yirik tashkilotlar va TIN'lar</h2>
    <div class="grid grid-2">
      <div class="card"><h3>Top 20 tashkilot — 6-shakil bo'yicha</h3>${
        table(['INN','Nomi','Yozuv','Jami yer','Q.x.','Haydalma','Ekin'], d.six_shapes.top_organizations, [
          { fn: it => safe(it._id) },
          { fn: it => `<div style="font-size:0.78rem">${safe(it.name)}</div>` },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.total_land_area) },
          { num: true, fn: it => fmt(it.agricultural) },
          { num: true, fn: it => fmt(it.arable) },
          { num: true, fn: it => fmt(it.sown) },
        ], 'scroll-400')
      }</div>
      <div class="card"><h3>Top 20 TIN — kadastr bo'yicha</h3>${
        table(['TIN','Egasi','Yozuv','Maydon (ga)'], d.agri_land_full.top_tins, [
          { fn: it => safe(it._id) },
          { fn: it => `<div style="font-size:0.78rem">${safe(it.owner)}</div>` },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ], 'scroll-400')
      }</div>
    </div>
  </div>`;

  // ============ SECTION 10: TIN-SOATO ============
  html += `<div class="section">
    <h2>TIN-SOATO juftlik analizi (top 15)</h2>
    <div class="card">${
      table(['TIN','SOATO','Kadastr maydon','Chizilgan','Kadastr+chizilgan','6-shakil','Bergan','Olgan','Farq'],
        d.tin_soato_pairs.top_tins, [
          { fn: it => safe(it.tin) },
          { fn: it => safe(it.soato) },
          { num: true, fn: it => fmt(it.gis_area_ha_total) },
          { num: true, fn: it => fmt(it.arable_area_size_total) },
          { num: true, fn: it => fmt((it.gis_area_ha_total||0) + (it.arable_area_size_total||0)) },
          { num: true, fn: it => fmt(it.total_land_area) },
          { num: true, fn: it => fmt(it.bergan_total) },
          { num: true, fn: it => fmt(it.olgan_total) },
          { num: true, fn: it => fmt((it.gis_area_ha_total||0)+(it.arable_area_size_total||0)-(it.total_land_area||0)-(it.bergan_total||0)+(it.olgan_total||0)) },
        ])
    }</div>
  </div>`;

  // ============ SECTION 11: Mahalla breakdown ============
  html += `<div class="section">
    <h2>Mahalla bo'yicha taqsimot (kadastr)</h2>
    <div class="card">${
      table(['Mahalla','Yozuv','TIN soni','Maydon (ga)'], d.agri_land_full.by_mahalla, [
        { fn: it => safe(it._id) },
        { num: true, fn: it => fmtI(it.count) },
        { num: true, fn: it => fmtI(it.tin_count) },
        { num: true, fn: it => fmt(it.area) },
      ], 'scroll-400')
    }</div>
  </div>`;

  // ============ SECTION 12: Cadastral integrity ============
  html += `<div class="section">
    <h2>Kadastr integrity (is_active / removed / shape comparison)</h2>
    <div class="grid grid-3">
      <div class="card"><h3>is_active</h3>${
        table(['Status','Yozuv','Maydon'], d.agri_land_full.is_active, [
          { fn: it => it._id ? '<span class="pill pill-green">Active</span>' : '<span class="pill pill-red">Inactive</span>' },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ])
      }</div>
      <div class="card"><h3>removed_by_qx</h3>${
        table(['Status','Yozuv','Maydon'], d.agri_land_full.removed_by_qx, [
          { fn: it => it._id ? '<span class="pill pill-red">O\'chirilgan</span>' : '<span class="pill pill-green">Mavjud</span>' },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ])
      }</div>
      <div class="card"><h3>compare_cadastral vs report_shape</h3>${
        table(['Holat','Yozuv','Diff sum'], d.agri_land_full.cadastral_comparison, [
          { fn: it => safe(it._id) },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.diff_sum) },
        ])
      }</div>
    </div>
  </div>`;

  // ============ SECTION 12.5: Reserve land clean remainder ============
  const rl = d.reserve_land?.overall || {};
  html += `<div class="section">
    <h2 style="border-left-color:#a04ff7">Reserve Land Clean Remainder — hokimyat zaxira yer qoldiqlari</h2>
    <div class="stats-bar" style="padding:0 0 14px 0">
      <div class="stat-card"><div class="label">Yozuvlar</div><div class="value">${fmtI(rl.count)}</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value">${fmtI(rl.active_count)}</div></div>
      <div class="stat-card"><div class="label">Unique kadastr</div><div class="value">${fmtI(rl.cadastral_count)}</div></div>
      <div class="stat-card"><div class="label">Mahallalar</div><div class="value">${fmtI(rl.mahalla_count)}</div></div>
      <div class="stat-card"><div class="label">Original maydon (ga)</div><div class="value">${fmt(rl.original_area)}</div></div>
      <div class="stat-card green"><div class="label">Toza qoldiq (ga)</div><div class="value">${fmt(rl.clean_area)}</div></div>
      <div class="stat-card yellow"><div class="label">Auksionga chiqarilgan (ga)</div><div class="value">${fmt(rl.auctioned_area)}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><h3>Property Kind bo'yicha</h3>${
        table(['Property','Yozuv','Original (ga)','Toza (ga)','Auction (ga)'], d.reserve_land?.by_property || [], [
          { fn: it => safe(it._id) },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.original_area) },
          { num: true, fn: it => fmt(it.clean_area) },
          { num: true, fn: it => fmt(it.auctioned_area) },
        ])
      }</div>
      <div class="card"><h3>BA Unit Type bo'yicha</h3>${

// === Kadastrlar ro'yxati ===
const HOKIMYAT_TIN = '201039878';

function renderCadRow(it, i, offset) {
  const isHokimyat = String(it.tin) === HOKIMYAT_TIN;
  return `<tr${isHokimyat ? ' style="background:#fff8ec"' : ''}>
    <td>${offset + i + 1}</td>
    <td><span style="font-family:monospace;font-size:0.78rem">${safe(it.cadastral_number)}</span></td>
    <td>${isHokimyat ? `<span class="pill" style="background:#f7914f;color:#fff">${safe(it.tin)}</span>` : safe(it.tin)}</td>
    <td><div style="font-size:0.76rem;max-width:180px">${safe(it.owner_full_name)}</div></td>
    <td>${safe(it.land_fund_category)}</td>
    <td><span style="font-family:monospace;font-size:0.74rem">${safe(it.land_fund_type)}</span></td>
    <td>${safe(it.property_kind)}</td>
    <td>${safe(it.tenancy_type_code)}</td>
    <td>${safe(it.mahalla_name)}</td>
    <td class="num">${fmt(it.gis_area_ha)}</td>
    <td>${it.is_active ? '<span class="pill pill-green">A</span>' : '<span class="pill pill-red">I</span>'} ${it.removed_by_qx ? '<span class="pill pill-red">RM</span>' : ''}</td>
  </tr>`;
}

function renderPager(containerId, page, pages, listIdx) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const btn = (label, p, disabled) =>
    `<button onclick="loadCadList(${listIdx}, ${p})" ${disabled ? 'disabled' : ''}
      style="padding:5px 11px;border:1px solid #ddd;background:#fff;border-radius:5px;cursor:pointer;font-size:0.82rem;${disabled ? 'opacity:.4;cursor:not-allowed' : ''}">${label}</button>`;
  c.innerHTML =
    btn('«', 1, page <= 1) + btn('‹', page - 1, page <= 1) +
    `<span style="font-size:0.85rem;color:#666;padding:0 8px">${page} / ${pages}</span>` +
    btn('›', page + 1, page >= pages) + btn('»', pages, page >= pages);
}

async function loadCadList(listIdx, page) {
  const filtered = listIdx === 2 ? 1 : 0;
  const r = await fetch(`/api/agri-land-tins/qungirot-cadastrals?filtered=${filtered}&page=${page}&limit=50`);
  const d = await r.json();
  const tbody = `<div style="overflow:auto;max-height:560px"><table>
    <thead><tr>
      <th>#</th><th>Kadastr</th><th>TIN</th><th>Egasi</th><th>Cat</th><th>Type</th>
      <th>Property</th><th>Tenancy</th><th>Mahalla</th><th>Maydon (ga)</th><th>Holat</th>
    </tr></thead>
    <tbody>${d.items.map((it, i) => renderCadRow(it, i, (page-1)*50)).join('')}</tbody>
  </table></div>
  <div style="margin-top:8px;font-size:0.82rem;color:#666">
    Jami: <b>${fmtI(d.total)}</b> · Maydon: <b>${fmt(d.totals.area)}</b> · Unique TIN: <b>${fmtI(d.totals.tin_count)}</b> · Hokimyat (${HOKIMYAT_TIN}) yozuvlar: <b style="color:#f7914f">${fmtI(d.hokimyat_count)}</b>
  </div>`;
  document.getElementById(`cad-list-${listIdx}`).innerHTML = tbody;
  renderPager(`cad-pag-${listIdx}`, page, d.pages, listIdx);
}

          { num: true, fn: it => fmt(it.area) },
        ])
      }</div>
      <div class="card"><h3>Chizilgan — Ground Source</h3>${
        table(['Code','Tavsif','Yozuv','Maydon'], d.defined_arable_lands.by_ground_source, [
          { fn: it => `<span class="pill pill-yellow">${it._id}</span>` },
          { fn: it => GROUND_SRC[it._id] || '—' },
          { num: true, fn: it => fmtI(it.count) },
          { num: true, fn: it => fmt(it.area) },
        ])
      }</div>
    </div>`;
  }

  // Mahalla breakdown
  h += `<div class="card" style="margin-top:14px"><h3>Mahalla bo'yicha</h3>${
    table(['Mahalla','Tuman','Yozuv','Maydon (ga)'], d.agri_land_full.by_mahalla, [
      { fn: it => safe(it._id) },
      { fn: it => safe(it.tuman) },
      { num: true, fn: it => fmtI(it.count) },
      { num: true, fn: it => fmt(it.area) },
    ], 'scroll-400')
  }</div>`;

  // TIN-SOATO records
  h += `<div class="card" style="margin-top:14px"><h3>TIN-SOATO juftliklar (mahalla bo'yicha kesimi)</h3>${
    table(['SOATO','Kadastr maydon','Chizilgan','Kadastr+chizilgan','6-shakl','Bergan','Olgan','Farq'],
      d.tin_soato_pairs.records, [
        { fn: it => safe(it.soato) },
        { num: true, fn: it => fmt(it.gis_area_ha_total) },
        { num: true, fn: it => fmt(it.arable_area_size_total) },
        { num: true, fn: it => fmt((it.gis_area_ha_total||0) + (it.arable_area_size_total||0)) },
        { num: true, fn: it => fmt(it.total_land_area) },
        { num: true, fn: it => fmt(it.bergan_total) },
        { num: true, fn: it => fmt(it.olgan_total) },
        { num: true, fn: it => fmt((it.gis_area_ha_total||0)+(it.arable_area_size_total||0)-(it.total_land_area||0)-(it.bergan_total||0)+(it.olgan_total||0)) },
      ], 'scroll-400')
  }</div>`;

  // Top kadastr records
  h += `<div class="card" style="margin-top:14px"><h3>Eng yirik kadastr yozuvlar (top 50)</h3>${
    table(['Kadastr №','Category','Type','Property','Tenancy','Tuman','Mahalla','Maydon (ga)','Holat'],
      d.agri_land_full.records, [
        { fn: it => `<span style="font-family:monospace;font-size:0.78rem">${safe(it.cadastral_number)}</span>` },
        { fn: it => safe(it.land_fund_category) },
        { fn: it => `<span style="font-family:monospace;font-size:0.75rem">${safe(it.land_fund_type)}</span>` },
        { fn: it => safe(it.property_kind) },
        { fn: it => safe(it.tenancy_type_code) },
        { fn: it => safe(it.tuman_name) },
        { fn: it => safe(it.mahalla_name) },
        { num: true, fn: it => fmt(it.gis_area_ha) },
        { fn: it => `${it.is_active ? '<span class="pill pill-green">A</span>' : '<span class="pill pill-red">I</span>'} ${it.removed_by_qx ? '<span class="pill pill-red">RM</span>' : ''}` },
      ], 'scroll-400')
  }</div>`;

  // Top 6-shakil records
  if (s.count > 0) {
    h += `<div class="card" style="margin-top:14px"><h3>6-shakil yozuvlar (top 50)</h3>${
      table(['SOATO','Type','Tavsif','Status','Jami yer','Q.x.','Haydalma','Ekin'], d.six_shapes.records, [
        { fn: it => safe(it.soato) },
        { fn: it => `<span style="font-family:monospace;font-size:0.75rem">${safe(it.land_fund_type)}</span>` },
        { fn: it => `<div style="font-size:0.76rem">${safe(it.land_fund_type_description)}</div>` },
        { fn: it => safe(it.status_name) },
        { num: true, fn: it => fmt(it.total_land_area) },
        { num: true, fn: it => fmt(it.agricultural_land_total) },
        { num: true, fn: it => fmt(it.arable_land) },
        { num: true, fn: it => fmt(it.sown_area) },
      ], 'scroll-400')
    }</div>`;
  }

  // Defined records
  if (f.count > 0) {
    h += `<div class="card" style="margin-top:14px"><h3>Chizilgan yer yozuvlari (top 50)</h3>${
      table(['Tuman SOATO','Mahalla TIN','Field cat','Ground src','Maydon','Bir-birga','Tavsif'],
        d.defined_arable_lands.records, [
          { fn: it => safe(it.tuman_soato) },
          { fn: it => safe(it.mahalla_tin) },
          { fn: it => `${it.field_category} — ${FIELD_CAT[it.field_category] || ''}` },
          { fn: it => `${it.ground_source} — ${GROUND_SRC[it.ground_source] || ''}` },
          { num: true, fn: it => fmt(it.area_size) },
          { fn: it => it.fell_on_top_of_each_other ? '<span class="pill pill-red">HA</span>' : '—' },
          { fn: it => `<div style="font-size:0.76rem">${safe(it.description)}</div>` },
        ], 'scroll-400')
    }</div>`;
  }

  root.innerHTML = h;
}
</script>
</body>
</html>
